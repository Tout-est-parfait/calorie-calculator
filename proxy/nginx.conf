# ============================================================
# 热量计算器 — Nginx 反向代理配置
# 将 /api/deepseek 转发到 DeepSeek API
# ============================================================
#
# 使用方法：
#   1. 将下方 location 块放入你的 Nginx server 配置中
#   2. 替换 YOUR_DEEPSEEK_API_KEY 为你的真实 API Key
#   3. 重新加载 Nginx: nginx -s reload
#   4. 在应用设置中启用「代理模式」
#
# 代理路径：
#   DeepSeek:  /api/deepseek/chat/completions
# ============================================================

server {
    listen 80;
    server_name localhost;

    # 静态文件根目录（热量计算器项目目录）
    root /path/to/calorie-calculator-master;
    index index.html;

    # ---------- DeepSeek API 代理 ----------
    location /api/deepseek/chat/completions {
        # 只允许 POST
        if ($request_method != POST) {
            return 405;
        }

        # 转发到 DeepSeek API
        proxy_pass https://api.deepseek.com/v1/chat/completions;

        # 注入 API Key（浏览器不暴露）
        proxy_set_header Authorization "Bearer YOUR_DEEPSEEK_API_KEY";

        # 基础代理头
        proxy_set_header Content-Type application/json;
        proxy_set_header Host api.deepseek.com;

        # 禁用缓存
        proxy_no_cache 1;
        proxy_cache_bypass 1;

        # 超时设置（AI API 响应较慢）
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # 允许跨域（同源部署时不需要，但如果前端在不同端口则需要）
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        # 处理 OPTIONS 预检请求
        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}
